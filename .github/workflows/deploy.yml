name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'tac-twin-dev/**'
      - 'wrangler.jsonc'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tac-twin-dev/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: tac-twin-dev

      - name: Build
        run: npm run build
        working-directory: tac-twin-dev

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy tac-twin-dev/dist --project-name=tac-twin --commit-dirty=true
